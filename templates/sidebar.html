{% load static %}
<aside class="sidebar" id="sidebar">
    <!-- New Add Button (ChatGPT style) -->
    <div class="sidebar-top">
        <a href="{% url 'home' %}" class="new-chat-btn">
           <b> <span class="medical-plus-icon">+ </span>
            AI Medical Reports </b>
        </a>
        <button class="close-sidebar-btn" id="sidebarCloseBtn" title="Close sidebar">
            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="20" width="20" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
        </button>
    </div>

    <!-- History Section -->
    <div class="sidebar-content">
        <a href="#" class="history-item {% if request.resolver_match.url_name == 'open_history_file' %}active{% endif %}">
            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            History
        </a>

        <!-- Recent history items (chat-like) -->
        <div class="history-list" style="margin-top:1rem;">
            {% if sidebar_history_files %}
                <div class="history-actions" style="display:flex; justify-content:space-between; align-items:center; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 0.5rem;">
                    <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; font-size: 0.85rem; color: var(--text-muted);">
                        <input type="checkbox" id="selectAllHistory" style="cursor:pointer;">
                        Select All
                    </label>
                    <button id="deleteSelectedBtn" style="display:none; background:none; border:none; color:#ff4444; cursor:pointer; font-size:0.85rem; display:flex; align-items:center; gap:0.2rem;" title="Delete Selected">
                        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        Delete
                    </button>
                </div>

                <form id="historyDeleteForm">
                    {% csrf_token %}
                    {% for f in sidebar_history_files %}
                    <div class="history-item-container" style="display:flex; align-items:center; gap:0.5rem; width: 100%;">
                        <input type="checkbox" class="history-checkbox" name="file_names[]" value="{{ f.name }}" style="cursor:pointer; flex-shrink:0;">
                        
                        <a href="{% url 'open_history_file' f.name %}" class="history-item small-item" style="flex-grow:1; display:flex; align-items:center; padding:0.4rem 0.2rem; text-overflow:ellipsis; white-space:nowrap; overflow:hidden; text-decoration:none;">
                            <span style="display:inline-block; width:28px; height:28px; border-radius:6px; background:rgba(0,0,0,0.04); text-align:center; line-height:28px; margin-right:8px; flex-shrink:0;">📄</span>
                            <span style="font-size:0.9rem; color:var(--text); overflow:hidden; text-overflow:ellipsis;" title="{{ f.name }}">{{ f.name }}</span>
                        </a>
                        
                        <button type="button" class="single-delete-btn" data-filename="{{ f.name }}" style="background:none; border:none; color:var(--text-muted); cursor:pointer; padding:0.4rem; flex-shrink:0;" title="Delete">
                            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                    {% endfor %}
                </form>
            {% else %}
                <div style="color:var(--text-muted); font-size:0.9rem; padding:0.5rem 0;">No history yet</div>
            {% endif %}
        </div>
    </div>
</aside>

<!-- Open Sidebar Button (visible when sidebar is closed) -->
<button class="open-sidebar-btn" id="headerOpenSidebarBtn" title="Open sidebar">
    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="20" width="20" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
</button>

<!-- Mobile Toggle -->
<button class="sidebar-mobile-toggle" id="sidebarToggle" title="Toggle sidebar">
    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="24" width="24" xmlns="http://www.w3.org/2000/svg"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
</button>

<!-- Custom Confirmation Modal -->
<div id="deleteConfirmModal" class="confirm-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; backdrop-filter:blur(4px); align-items:center; justify-content:center; opacity: 0; transition: opacity 0.2s ease;">
    <div style="background:var(--card-bg); border:1px solid var(--glass-border); border-radius:12px; padding:2rem; width:90%; max-width:400px; box-shadow:0 8px 32px rgba(0,0,0,0.3); text-align:center; transform: translateY(-20px); transition: transform 0.2s ease;" id="deleteConfirmModalBox">
        <div style="background:rgba(255,68,68,0.1); width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; color:#ff4444;">
            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="32" width="32" xmlns="http://www.w3.org/2000/svg"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        </div>
        <h3 style="color:var(--text); font-size:1.25rem; font-weight:600; margin-bottom:0.8rem;">Confirm Deletion</h3>
        <p id="deleteConfirmMessage" style="color:var(--text-muted); font-size:0.95rem; margin-bottom:2rem; line-height:1.5;">Are you sure you want to delete this?</p>
        <div style="display:flex; gap:1rem; justify-content:center;">
            <button id="cancelDeleteBtn" style="padding:0.75rem 1.5rem; border-radius:8px; border:1px solid var(--glass-border); background:transparent; color:var(--text); cursor:pointer; font-weight:500; transition:background 0.2s;">Cancel</button>
            <button id="confirmDeleteBtn" style="padding:0.75rem 1.5rem; border-radius:8px; border:none; background:#ff4444; color:white; cursor:pointer; font-weight:500; box-shadow:0 4px 12px rgba(255,68,68,0.3); transition:background 0.2s;">Delete</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const sidebar = document.getElementById('sidebar');
        const closeBtn = document.getElementById('sidebarCloseBtn');
        const openBtn = document.getElementById('headerOpenSidebarBtn'); // Will be in base.html
        const mobileToggleBtn = document.getElementById('sidebarToggle');
        
        // Function to close sidebar
        function closeSidebar() {
            sidebar.classList.add('closed');
            if(openBtn) openBtn.classList.add('visible');
        }

        // Function to open sidebar
        function openSidebar() {
            sidebar.classList.remove('closed');
            if(openBtn) openBtn.classList.remove('visible');
        }
        
        // Event Listeners
        if(closeBtn) {
            closeBtn.addEventListener('click', closeSidebar);
        }

        if(openBtn) {
            openBtn.addEventListener('click', openSidebar);
        }

        // Mobile toggle
        if(mobileToggleBtn){
            mobileToggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('open');
            });
        }

        // --- History Deletion Logic ---
        const selectAllCheckbox = document.getElementById('selectAllHistory');
        const historyCheckboxes = document.querySelectorAll('.history-checkbox');
        const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
        const singleDeleteBtns = document.querySelectorAll('.single-delete-btn');
        
        function updateDeleteBtnVisibility() {
            if(!deleteSelectedBtn) return;
            const anyChecked = Array.from(historyCheckboxes).some(cb => cb.checked);
            deleteSelectedBtn.style.display = anyChecked ? 'flex' : 'none';
        }

        if(selectAllCheckbox) {
            selectAllCheckbox.addEventListener('change', (e) => {
                historyCheckboxes.forEach(cb => cb.checked = e.target.checked);
                updateDeleteBtnVisibility();
            });
        }

        historyCheckboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                const allChecked = Array.from(historyCheckboxes).every(c => c.checked);
                if(selectAllCheckbox) selectAllCheckbox.checked = allChecked;
                updateDeleteBtnVisibility();
            });
        });

        // Initialize display state
        updateDeleteBtnVisibility();

        // Custom Modal Logic
        const modal = document.getElementById('deleteConfirmModal');
        const modalBox = document.getElementById('deleteConfirmModalBox');
        const confirmBtn = document.getElementById('confirmDeleteBtn');
        const cancelBtn = document.getElementById('cancelDeleteBtn');
        const modalMessage = document.getElementById('deleteConfirmMessage');
        
        // Helper to show modal and return a Promise resolving to true/false
        function requestConfirmation(message) {
            return new Promise((resolve) => {
                modalMessage.textContent = message;
                modal.style.display = 'flex';
                // Trigger reflow for transition
                void modal.offsetWidth;
                modal.style.opacity = '1';
                modalBox.style.transform = 'translateY(0)';
                
                const handleConfirm = () => {
                    cleanup();
                    resolve(true);
                };
                
                const handleCancel = () => {
                    cleanup();
                    resolve(false);
                };
                
                const cleanup = () => {
                    modal.style.opacity = '0';
                    modalBox.style.transform = 'translateY(-20px)';
                    setTimeout(() => {
                        modal.style.display = 'none';
                    }, 200);
                    confirmBtn.removeEventListener('click', handleConfirm);
                    cancelBtn.removeEventListener('click', handleCancel);
                };
                
                confirmBtn.addEventListener('click', handleConfirm);
                cancelBtn.addEventListener('click', handleCancel);
            });
        }
        
        // Helper to show a simple error alert via the same modal layout
        function showCustomAlert(message) {
            modalMessage.textContent = message;
            cancelBtn.style.display = 'none';
            confirmBtn.textContent = 'OK';
            confirmBtn.style.background = 'var(--primary-color)';
            confirmBtn.style.boxShadow = '0 4px 12px var(--primary-color-03)';
            
            modal.style.display = 'flex';
            void modal.offsetWidth;
            modal.style.opacity = '1';
            modalBox.style.transform = 'translateY(0)';
            
            confirmBtn.onclick = () => {
                modal.style.opacity = '0';
                modalBox.style.transform = 'translateY(-20px)';
                setTimeout(() => {
                    modal.style.display = 'none';
                    // reset button styles
                    cancelBtn.style.display = 'block';
                    confirmBtn.textContent = 'Delete';
                    confirmBtn.style.background = '#ff4444';
                    confirmBtn.style.boxShadow = '0 4px 12px rgba(255,68,68,0.3)';
                    confirmBtn.onclick = null;
                }, 200);
            };
        }

        // Perform AJAX delete
        async function performDelete(fileNames) {
            if(!fileNames || fileNames.length === 0) return;
            
            const formData = new FormData();
            fileNames.forEach(name => formData.append('file_names[]', name));
            
            // Get CSRF Token
            let csrfToken = '';
            const csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
            if(csrfInput) {
                csrfToken = csrfInput.value;
            } else {
                // fallback to cookie if needed
                const name = 'csrftoken=';
                const decodedCookie = decodeURIComponent(document.cookie);
                const ca = decodedCookie.split(';');
                for(let i = 0; i <ca.length; i++) {
                    let c = ca[i];
                    while (c.charAt(0) === ' ') {
                        c = c.substring(1);
                    }
                    if (c.indexOf(name) === 0) {
                        csrfToken = c.substring(name.length, c.length);
                    }
                }
            }

            try {
                const response = await fetch("{% url 'delete_history' %}", {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': csrfToken
                    },
                    body: formData
                });
                
                const result = await response.json();
                if(response.ok) {
                    // Reload page to reflect changes
                    window.location.reload();
                } else {
                    showCustomAlert('Error deleting files: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error:', error);
                showCustomAlert('An error occurred while deleting files.');
            }
        }

        // Bulk Delete Action
        if(deleteSelectedBtn) {
            deleteSelectedBtn.addEventListener('click', async () => {
                const selectedFiles = Array.from(historyCheckboxes)
                    .filter(cb => cb.checked)
                    .map(cb => cb.value);
                
                if(selectedFiles.length > 0) {
                    const confirmed = await requestConfirmation(`Are you sure you want to permanently delete these ${selectedFiles.length} item(s)?`);
                    if(confirmed) {
                        performDelete(selectedFiles);
                    }
                }
            });
        }

        // Single Delete Action
        singleDeleteBtns.forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.preventDefault(); // Just in case
                const filename = btn.getAttribute('data-filename');
                if(filename) {
                    const confirmed = await requestConfirmation(`Are you sure you want to permanently delete "${filename}"?`);
                    if(confirmed) {
                        performDelete([filename]);
                    }
                }
            });
            
            // Add hover effect for trash icon
            btn.addEventListener('mouseenter', () => btn.style.color = '#ff4444');
            btn.addEventListener('mouseleave', () => btn.style.color = 'var(--text-muted)');
        });
    });
</script>
